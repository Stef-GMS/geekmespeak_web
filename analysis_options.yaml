# This file configures the static analysis results for your project (errors,
# warnings, and lints).
#
# This enables the 'recommended' set of lints from `package:lints`.
# This set helps identify many issues that may lead to problems when running
# or consuming Dart code, and enforces writing Dart using a single, idiomatic
# style and format.
#
# If you want a smaller set of lints you can change this to specify
# 'package:lints/core.yaml'. These are just the most critical lints
# (the recommended set includes the core lints).
# The core lints are also what is used by pub.dev for scoring packages.

include: package:lints/recommended.yaml

linter:
  rules:
    use_super_parameters: true
    # The public_member_api_docs rule in Flutter's analysis_options.yaml file
    # is a linter rule that requires all public members of an API (classes,
    # methods, fields, etc.) to have documentation comments. This helps ensure
    # that your code is well-documented and easy to understand for other developers,
    # and even for your future self.
    #
    # To require documentation comments for public members, set to true.
    # To relax the requirement, set to false.
    public_member_api_docs: false
    # avoid_print: false  # Uncomment to disable the `avoid_print` rule
    # prefer_single_quotes: true  # Uncomment to enable the `prefer_single_quotes` rule


formatter:
  trailing_commas: preserve

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
